<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/TC69_Logo_Nachbau_2023_11.png" alt="TC69 Logo" />
      <h1>TC69</h1>
      <p>Turnierverwaltung</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div *ngIf="registered" class="mb-3">
        <p-message severity="info" text="Danke für deine Registrierung! Du erhältst in Kürze eine E-Mail zwecks Bestätigung."></p-message>
      </div>
      <div *ngIf="confirmed" class="mb-3">
        <p-message severity="success" text="E-Mail erfolgreich bestätigt. Du kannst dich jetzt einloggen."></p-message>
      </div>

      <div class="p-field">
        <label for="email">E-Mail</label>
        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
          placeholder="E-Mail Adresse"
          class="w-full"
        />
      </div>

      <div class="p-field">
        <label for="password">Passwort</label>
        <p-password
          id="password"
          formControlName="password"
          class="w-full"
          [style]="{'width':'100%'}"
          [inputStyle]="{'width':'100%'}"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Passwort"
        ></p-password>
      </div>

      <div *ngIf="message" class="mb-3">
        <p-message severity="error" [text]="message"></p-message>
      </div>

      <p-button type="submit" label="Anmelden" [disabled]="loginForm.invalid" styleClass="w-full login-submit" />
    </form>

    <div class="login-links">
      <a [routerLink]="['/reset']">Passwort vergessen?</a>
      <a [routerLink]="['/register']">Noch kein Konto? Registrieren</a>
    </div>
  </div>
</div>
