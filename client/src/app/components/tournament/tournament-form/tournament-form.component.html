<p-card header="Neues Turnier">
  <form [formGroup]="tournamentForm" (ngSubmit)="onSubmit()">
    <div class="formgrid grid my-3">
      <div class="field col-12 md:col-12">
        <p-floatlabel variant="in">
          <input pInputText id="name" formControlName="name" autocomplete="off" />
          <label for="name">Name</label>
        </p-floatlabel>
      </div>

      <div class="field col-12 md:col-12">
        <p-floatlabel variant="in">
          <textarea pTextarea id="description" formControlName="description" rows="2" cols="30" style="resize: none" class="h-full"></textarea>
          <label for="description">Beschreibung</label>
        </p-floatlabel>
      </div>

      <div class="field col-12 md:col-12">
        <p-floatlabel variant="in">
          <textarea pTextarea id="additionalNotes" formControlName="additionalNotes" rows="2" cols="30" style="resize: none" class="h-full"></textarea>
          <label for="additionalNotes">Weitere Anmerkungen</label>
        </p-floatlabel>
      </div>

      <div class="field col-12 md:col-12">
        <p-floatlabel variant="in">
          <p-datepicker
            id="deadline"
            inputId="deadline"
            formControlName="deadline"
            [minDate]="today"
            dateFormat="dd.mm.yy"
            showIcon="true"
            [showTime]="true"
          ></p-datepicker>
          <label for="deadline">Anmeldefrist</label>
        </p-floatlabel>
      </div>

      <div class="field col-12 md:col-4">
        <p-floatlabel variant="in">
          <p-inputnumber
            id="entryFee"
            inputId="entryFee"
            formControlName="entryFee"
            [min]="0"
            [maxFractionDigits]="0"
            suffix=" EUR"
            [useGrouping]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <label for="entryFee">Startgeld *</label>
        </p-floatlabel>
        <small *ngIf="tournamentForm.get('entryFee')?.invalid && tournamentForm.get('entryFee')?.touched" class="p-error">
          Bitte gib ein gültiges Startgeld (ganze Euro) an.
        </small>
      </div>

      <div class="field col-12 md:col-12">
        <div formArrayName="tournamentTypes" class="formgroup-inline md:py-3">
          <div *ngFor="let type of availableTournamentTypes; let i = index">
            <div class="field-checkbox md:p-1 sm:p-0">
              <p-checkbox [id]="type.value"
                          size="large"
                          binary="true"
                          [value]="type.value"
                          [formControlName]="i"
                          (onChange)="toggleTournamentType(type, $event.checked)"  />
              <label [for]="type.value" class="md:text-lg sm:text-sm"> {{ type.label }}</label>
            </div>
          </div>
        </div>
      </div>

      <div class="field col-12 md:col-12">
        <div formArrayName="tournamentDays">
          <div *ngFor="let day of tournamentDays.controls; let i = index" [formGroupName]="i" class="day-row">
            <div class="formgroup-inline align-items-center">
              <div class="field">
                <p-floatlabel variant="in" class="date-picker">
                  <p-datepicker
                    formControlName="date"
                    [minDate]="today"
                    dateFormat="dd.mm.yy"
                    showIcon="true"
                    inputId="dayDate{{ i }}"
                  ></p-datepicker>
                  <label for="dayDate{{ i }}">Datum</label>
                </p-floatlabel>
              </div>
              <div class="field">
                <p-floatlabel variant="in" class="start-time">
                  <p-datepicker formControlName="time1" [showTime]="true" [timeOnly]="true" hourFormat="24" inputId="time1_{{ i }}"></p-datepicker>
                  <label for="time1_{{ i }}">Zeit 1</label>
                </p-floatlabel>
              </div>
              <div class="field">
                <p-floatlabel variant="in" class="start-time">
                  <p-datepicker formControlName="time2" [showTime]="true" [timeOnly]="true" hourFormat="24" inputId="time2_{{ i }}"></p-datepicker>
                  <label for="time2_{{ i }}">Zeit 2</label>
                </p-floatlabel>
              </div>
              <div class="field">
                <p-floatlabel variant="in" class="start-time">
                  <p-datepicker formControlName="time3" [showTime]="true" [timeOnly]="true" hourFormat="24" inputId="time3_{{ i }}"></p-datepicker>
                  <label for="time3_{{ i }}">Zeit 3</label>
                </p-floatlabel>
              </div>
              <div class="field pt-2">
                <p-button icon="pi pi-times" severity="danger" (click)="removeTournamentDay(i)" *ngIf="tournamentDays.length > 1" />
              </div>
            </div>
            <div class="add-day-btn" *ngIf="i == tournamentDays.length - 1">
              <p-button icon="pi pi-plus" label="Tag hinzufügen" severity="secondary" (click)="addTournamentDay()" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="tournament && tournament.registrationCount > 0" class="p-fluid">
      <p-message severity="warn" text="Achtung: Es existieren bereits Registrierungen für dieses Turnier. Änderungen könnten sich auf diese auswirken."></p-message>
    </div>

    <div class="flex flex-column gap-2 mb-3">
      <p-message *ngIf="tournamentForm.hasError('deadlineAfterFirstDay') && tournamentForm.get('deadline')?.dirty" severity="error" text="Die Anmeldefrist muss vor dem ersten Turniertag liegen."></p-message>
    </div>

    <div class="button-group">
      <p-button type="button" label="Abbrechen" severity="secondary" (click)="onCancel()" />
      <p-button type="submit" label="Speichern" [disabled]="tournamentForm.invalid" />
    </div>

  </form>
</p-card>
