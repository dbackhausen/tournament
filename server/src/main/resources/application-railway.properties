spring.application.name=tournament

# Server port — Railway assigns PORT dynamically
server.port=${PORT:8080}

# Security
cors.allowed-origin=${CORS_ORIGIN}

# Logging
logging.level.org.springframework.security=INFO

# MySQL — provided by Railway MySQL plugin
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail (Brevo)
brevo.api-key=${BREVO_API_KEY}
mail.from=${MAIL_FROM}

# Frontend URL (for reset links in emails)
app.frontend-url=${FRONTEND_URL}
